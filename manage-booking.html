<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
    <meta name="description" content="View or cancel your appointment." />
    <title>Your appointment</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,700&family=Inter:wght@400;500;600;700&family=Lora:ital,wght@0,500;0,600;0,700;1,500&family=Montserrat:wght@400;500;600;700&family=Nunito:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500&family=Poppins:wght@400;500;600;700&family=Source+Sans+3:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/styles.css?v=49" />
    <style>
      #tenant-status {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        padding: 2rem;
        background: #fafafa;
        color: #525252;
        font: 600 1rem/1.5 "Source Sans 3", system-ui, sans-serif;
        text-align: center;
        z-index: 9999;
      }
      #tenant-status[hidden] {
        display: none;
      }
    </style>
  </head>
  <body class="tpl-profile page-manage-booking">
    <div id="tenant-status">Loading…</div>

    <nav class="profile-nav" id="profile-nav">
      <div class="container profile-nav__inner">
        <a class="profile-brand" href="/">
          <div class="profile-brand__logo" id="profile-logo-placeholder" aria-hidden="true"></div>
          <span id="profile-brand-name">Your Brand</span>
        </a>
        <a class="profile-book-btn" href="/booking">Book Now</a>
      </div>
    </nav>

    <main class="manage-booking-main">
      <div class="container manage-booking-page">
        <div class="page-hero page-hero--compact manage-booking-hero">
          <p class="manage-booking-hero__eyebrow" id="manage-booking-eyebrow">Your appointment</p>
          <div class="manage-booking-hero__title-row">
            <h1 id="manage-booking-title">Appointment details</h1>
            <span id="manage-booking-status" class="manage-booking-status is-active" hidden>Confirmed</span>
          </div>
          <p class="manage-booking-hero__lead" id="manage-booking-lead">
            Review your booking below. You can cancel here if your plans change.
          </p>
        </div>

        <div id="manage-booking-error" class="booking-feedback booking-feedback--error" role="alert" hidden></div>
        <div id="manage-booking-success" class="booking-feedback booking-feedback--success" role="status" hidden></div>

        <div id="manage-booking-content" class="manage-booking-content" hidden>
          <p id="manage-booking-greeting" class="manage-booking-greeting"></p>
          <p id="manage-booking-policy" class="manage-booking-policy" hidden></p>
          <p id="manage-booking-refund-hint" class="manage-booking-refund-hint" hidden></p>

          <dl class="manage-booking-details">
            <div class="manage-booking-details__row">
              <dt class="manage-booking-details__label">Service</dt>
              <dd class="manage-booking-details__value" id="manage-style">—</dd>
            </div>
            <div class="manage-booking-details__row">
              <dt class="manage-booking-details__label">Date</dt>
              <dd class="manage-booking-details__value" id="manage-date">—</dd>
            </div>
            <div class="manage-booking-details__row">
              <dt class="manage-booking-details__label">Time</dt>
              <dd class="manage-booking-details__value" id="manage-time">—</dd>
            </div>
            <div class="manage-booking-details__row">
              <dt class="manage-booking-details__label">Duration</dt>
              <dd class="manage-booking-details__value" id="manage-duration">—</dd>
            </div>
            <div class="manage-booking-details__row">
              <dt class="manage-booking-details__label">Estimated total</dt>
              <dd class="manage-booking-details__value" id="manage-total">—</dd>
            </div>
            <div class="manage-booking-details__row">
              <dt class="manage-booking-details__label">Deposit</dt>
              <dd class="manage-booking-details__value" id="manage-deposit">—</dd>
            </div>
            <div class="manage-booking-details__row">
              <dt class="manage-booking-details__label">Payment</dt>
              <dd class="manage-booking-details__value" id="manage-payment">—</dd>
            </div>
          </dl>

          <p class="manage-booking-ref">
            Booking reference:
            <code id="manage-booking-id">—</code>
          </p>

          <div id="manage-booking-actions" class="manage-booking-actions">
            <button type="button" class="btn btn-outline" id="manage-cancel-btn">Cancel appointment</button>
            <a class="btn btn-primary" href="/booking" id="manage-rebook-btn" hidden>Book again</a>
          </div>
        </div>
      </div>
    </main>

    <footer class="site-footer site-footer--home-promo">
      <div class="container footer-bottom">
        <p id="preview-footer-brand">&copy; Your brand name</p>
        <p class="footer-built-by">
          <a
            class="footer-built-by__link"
            id="preview-footer-styld-link"
            href="https://styldd.com"
            target="_blank"
            rel="noopener noreferrer"
          >
            <img
              class="footer-built-by__logo"
              src="/assets/styld-icon.png"
              alt=""
              width="22"
              height="22"
              decoding="async"
            />
            <span>Built with Styld</span>
          </a>
        </p>
      </div>
    </footer>

    <script src="/js/vercel-analytics.bundle.js" defer></script>
    <script src="/js/styld-tenant-config.js?v=40"></script>
    <script src="/js/styld-tenant-config.local.js?v=40"></script>
    <script src="/js/styld-tenant-shared.js?v=63"></script>
    <script src="/js/profile-content.js?v=40"></script>
    <script src="/js/tenant-site.js?v=15"></script>
    <script src="/js/manage-booking.js?v=3"></script>
  </body>
</html>
