<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
    <meta name="description" content="Your booking confirmation." />
    <title>Booking confirmed</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,700&family=Inter:wght@400;500;600;700&family=Lora:ital,wght@0,500;0,600;0,700;1,500&family=Montserrat:wght@400;500;600;700&family=Nunito:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500&family=Poppins:wght@400;500;600;700&family=Source+Sans+3:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/styles.css?v=40" />
    <style>
      #tenant-status {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        padding: 2rem;
        background: #fafafa;
        color: #525252;
        font: 600 1rem/1.5 "Source Sans 3", system-ui, sans-serif;
        text-align: center;
        z-index: 9999;
      }
      #tenant-status[hidden] { display: none; }
    </style>
  </head>
  <body class="tpl-profile page-booking-success">
    <div id="tenant-status">Loading…</div>

    <nav class="profile-nav" id="profile-nav">
      <div class="container profile-nav__inner">
        <a class="profile-brand" href="/">
          <div class="profile-brand__logo" id="profile-logo-placeholder" aria-hidden="true"></div>
          <span id="profile-brand-name">Your Brand</span>
        </a>
        <a class="profile-book-btn" href="/booking">Book Now</a>
      </div>
    </nav>

    <main class="booking-success-main">
      <div class="container booking-success-page">
        <div class="booking-success-panel">
          <p class="booking-success-panel__eyebrow" id="success-eyebrow">Booking confirmed</p>
          <h1 class="booking-success-panel__title" id="success-title">Thank you — you're booked</h1>
          <p class="booking-success-panel__lead" id="success-lead">
            We've received your appointment request. You'll get a confirmation email shortly.
          </p>
        </div>
      </div>
    </main>

    <footer class="site-footer site-footer--home-promo">
      <div class="container footer-bottom">
        <p id="preview-footer-brand">&copy; Your brand name</p>
        <p class="footer-built-by">
          <a
            class="footer-built-by__link"
            id="preview-footer-styld-link"
            href="https://styldd.com"
            target="_blank"
            rel="noopener noreferrer"
          >
            <img
              class="footer-built-by__logo"
              src="/assets/styld-icon.png"
              alt=""
              width="22"
              height="22"
              decoding="async"
            />
            <span>Built with Styld</span>
          </a>
        </p>
      </div>
    </footer>

    <script src="/js/vercel-analytics.bundle.js" defer></script>
    <script src="/js/styld-tenant-config.js?v=40"></script>
    <script src="/js/styld-tenant-config.local.js?v=40"></script>
    <script src="/js/styld-tenant-shared.js?v=59"></script>
    <script src="/js/profile-content.js?v=40"></script>
    <script src="/js/tenant-site.js?v=15"></script>
    <script src="/js/booking-success.js?v=2"></script>
  </body>
</html>
